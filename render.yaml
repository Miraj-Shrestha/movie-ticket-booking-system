services:
  - type: web
    name: movie-ticket-server
    env: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false   # Set this manually in Render dashboard to your Vercel URL
    healthCheckPath: /health
